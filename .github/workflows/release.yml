name: Release

on:
  push:
    tags:
      - "0.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Attest main.js
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: outputs/cancip/main.js

      - name: Attest manifest.json
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: outputs/cancip/manifest.json

      - name: Attest styles.css
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: outputs/cancip/styles.css

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME:-manual}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "Cancip $tag"
          gh release upload "$tag" \
            outputs/cancip/main.js \
            outputs/cancip/manifest.json \
            outputs/cancip/styles.css \
            --clobber
